name: Room 110 Autonomous Loop

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write       # ضروري عشان الـ Commit والـ Push
  pull-requests: write  # ضروري عشان الـ PR
  issues: write         # عشان يكتب تقريره

jobs:
  build-and-debate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # التوكن الأوتوماتيكي اللي جيت هاب بيوفره

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Room 110 Council
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # تمرير التوكن للسكربت
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python room110_core.py
