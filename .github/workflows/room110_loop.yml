name: Room 110 Autonomous Loop

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  issues:
    types: [opened]

jobs:
  build-and-debate:
    runs-on: ubuntu-latest
    permissions:
      issues: write # تعطي السيرفر صلاحية التعليق على الـ Issue
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Runtime Dependencies
      run: pip install requests

    - name: Execute Room 110 Core Orchestrator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # توكن تلقائي من جيت هاب للتعليق
        ISSUE_NUMBER: ${{ github.event.issue.number }} # رقم الآشيو الحالي
        REPOSITORY: ${{ github.repository }} # اسم الريبو بتاعك
      run: python room110_core.py
